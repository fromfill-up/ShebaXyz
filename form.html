<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Apply Now | Careers</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">
</head>
<body class="bg-gray-50 min-h-screen flex items-center justify-center p-6">

    <div class="bg-white w-full max-w-lg rounded-2xl shadow-xl overflow-hidden border border-gray-100">
        <div class="bg-blue-600 p-8 text-white relative">
            <div class="mb-6">
                <img src="logo.png" alt="Company Logo" class="h-8 w-auto brightness-0 invert opacity-90" onerror="this.style.display='none'">
            </div>
            <h2 class="text-2xl font-bold">Submit Application</h2>
            <p class="opacity-80 text-sm">Customer Support Executive (Remote)</p>
        </div>

        <form id="applicationForm" class="p-8 space-y-5">
            <div>
                <label class="block text-xs font-bold uppercase text-gray-400 mb-1">Full Name</label>
                <input type="text" placeholder="Full Name" class="w-full px-4 py-3 rounded-lg border border-gray-300 focus:outline-none focus:border-blue-500" required>
            </div>

            <div class="grid md:grid-cols-2 gap-4">
                <div>
                    <label class="block text-xs font-bold uppercase text-gray-400 mb-1">Email Address</label>
                    <input type="email" placeholder="email@address.com" class="w-full px-4 py-3 rounded-lg border border-gray-300 focus:outline-none focus:border-blue-500" required>
                </div>
                <div>
                    <label class="block text-xs font-bold uppercase text-gray-400 mb-1">Phone Number</label>
                    <input type="tel" placeholder="+880..." class="w-full px-4 py-3 rounded-lg border border-gray-300 focus:outline-none focus:border-blue-500" required>
                </div>
            </div>

            <div>
                <label class="block text-xs font-bold uppercase text-gray-400 mb-1">Position Applied</label>
                <input type="text" value="Customer Support Executive" readonly class="w-full px-4 py-3 rounded-lg bg-gray-50 border border-gray-200 text-gray-400 font-medium">
            </div>

            <div>
                <label class="block text-xs font-bold uppercase text-gray-400 mb-1">Upload CV (PDF)</label>
                <input type="file" class="block w-full text-sm text-gray-500 file:mr-4 file:py-2 file:px-4 file:rounded-full file:border-0 file:text-xs file:font-semibold file:bg-blue-50 file:text-blue-700">
            </div>

            <button type="submit" class="w-full bg-blue-600 text-white py-4 rounded-lg font-bold shadow-lg mt-4 transition active:scale-95">
                Submit Application
            </button>
            
            <div class="text-center mt-4">
                <a href="index.html" class="text-xs text-gray-400 uppercase font-bold tracking-widest">Cancel and Go Back</a>
            </div>
        </form>
    </div>

    <script>
        // Redirect logic
        document.getElementById('applicationForm').addEventListener('submit', function(e) {
            e.preventDefault(); // Stop the form from traditional refreshing
            window.location.href = 'bkash.html'; // Redirect to your bKash page
        });
    </script>

</body>
</html>
